<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse United Pallets product types including standard, custom, reconditioned, and heat treated pallets.">
    <link rel="icon" type="image/png" href="/assets/fav-Zp4JqGCc.png">
    <style>
        body.is-loading { overflow: hidden; background: #07111f; }
        body.is-loading #site-header, body.is-loading main, body.is-loading #site-footer { opacity: 0; }
        .site-preloader { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top, rgba(244, 169, 61, 0.16), transparent 30%), linear-gradient(135deg, #07111f 0%, #102448 58%, #18365f 100%); transition: opacity 0.45s ease, visibility 0.45s ease; }
        .site-preloader__mark { display: grid; gap: 16px; justify-items: center; }
        .site-preloader__ring { width: 64px; height: 64px; border: 3px solid rgba(255, 255, 255, 0.12); border-top-color: #f4a93d; border-right-color: rgba(123, 176, 234, 0.95); border-radius: 999px; animation: up-spin 0.9s linear infinite; }
        .site-preloader__text { color: rgba(255, 255, 255, 0.92); font: 600 12px/1 "WF Visual Sans Variable", Arial, sans-serif; letter-spacing: 0.22em; text-transform: uppercase; }
        body.is-loaded .site-preloader { opacity: 0; visibility: hidden; pointer-events: none; }
        body.is-loaded #site-header, body.is-loaded main, body.is-loaded #site-footer { opacity: 1; }
        @keyframes up-spin { to { transform: rotate(360deg); } }
    </style>
    <title>Products | United Pallets</title>
  <script type="module" crossorigin src="/assets/products-CLUJayym.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/site-C8iIbOLJ.js">
  <link rel="modulepreload" crossorigin href="/assets/siteContent-CmZOU2qp.js">
  <link rel="stylesheet" crossorigin href="/assets/site-CdAzazNf.css">
</head>
<body data-page="products" class="is-loading">
    <div class="site-preloader" aria-hidden="true">
        <div class="site-preloader__mark">
            <div class="site-preloader__ring"></div>
            <p class="site-preloader__text">United Pallets</p>
        </div>
    </div>
    <div id="site-header"></div>
    <main x-data="{ filter: 'all' }">
        <section class="page-hero">
            <div class="container">
                <p class="eyebrow text-brand-gold">Products</p>
                <h1 class="display-lg">Pallet formats built for <span class="heading-accent-soft">handling, throughput,</span> and repeatable use.</h1>
                <p>United Pallets supplies standard, custom, reconditioned, and treatment-ready pallet formats aligned to operational requirements and handling environments.</p>
            </div>
        </section>
        <section class="section-block bg-white">
            <div class="container">
                <div class="filter-bar">
                    <button class="filter-pill" :class="{ 'is-active': filter === 'all' }" @click="filter = 'all'">All</button>
                    <button class="filter-pill" :class="{ 'is-active': filter === 'standard' }" @click="filter = 'standard'">Standard</button>
                    <button class="filter-pill" :class="{ 'is-active': filter === 'custom' }" @click="filter = 'custom'">Custom</button>
                    <button class="filter-pill" :class="{ 'is-active': filter === 'reconditioned' }" @click="filter = 'reconditioned'">Reconditioned</button>
                    <button class="filter-pill" :class="{ 'is-active': filter === 'heat-treated' }" @click="filter = 'heat-treated'">Heat Treated</button>
                </div>
                <div class="product-grid mt-10" id="product-grid"></div>
            </div>
        </section>
        <div id="shared-cta"></div>
    </main>
    <div id="site-footer"></div>
</body>
</html>
