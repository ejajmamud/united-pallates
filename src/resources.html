<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Read pallet industry resources and operational guidance from United Pallets.">
    <link rel="icon" type="image/png" href="./assets/icons/fav.png">
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <style>
        body.is-loading { overflow: hidden; background: #07111f; }
        body.is-loading #site-header, body.is-loading main, body.is-loading #site-footer { opacity: 0; }
        .site-preloader { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top, rgba(244, 169, 61, 0.16), transparent 30%), linear-gradient(135deg, #07111f 0%, #102448 58%, #18365f 100%); transition: opacity 0.45s ease, visibility 0.45s ease; }
        .site-preloader__mark { display: grid; gap: 16px; justify-items: center; }
        .site-preloader__ring { width: 64px; height: 64px; border: 3px solid rgba(255, 255, 255, 0.12); border-top-color: #f4a93d; border-right-color: rgba(123, 176, 234, 0.95); border-radius: 999px; animation: up-spin 0.9s linear infinite; }
        .site-preloader__text { color: rgba(255, 255, 255, 0.92); font: 600 12px/1 Inter, sans-serif; letter-spacing: 0.22em; text-transform: uppercase; }
        body.is-loaded .site-preloader { opacity: 0; visibility: hidden; pointer-events: none; }
        body.is-loaded #site-header, body.is-loaded main, body.is-loaded #site-footer { opacity: 1; }
        @keyframes up-spin { to { transform: rotate(360deg); } }
    </style>
    <title>Resources | United Pallets</title>
</head>
<body data-page="resources" class="is-loading">
    <div class="site-preloader" aria-hidden="true">
        <div class="site-preloader__mark">
            <div class="site-preloader__ring"></div>
            <p class="site-preloader__text">United Pallets</p>
        </div>
    </div>
    <div id="site-header"></div>
    <main>
        <section class="page-hero">
            <div class="container">
                <p class="eyebrow text-brand-gold">Resources</p>
                <h1 class="display-lg">Operational articles for <span class="heading-accent">procurement, logistics,</span> and pallet handling teams.</h1>
                <p>United Pallets shares practical guidance on pallet formats, treatment methods, structural components, and corporate responsibility topics relevant to industrial supply chains.</p>
            </div>
        </section>
        <section class="section-block bg-white">
            <div class="container resource-grid" id="resource-grid"></div>
        </section>
        <div id="shared-cta"></div>
    </main>
    <div id="site-footer"></div>
    <script type="module" src="./scripts/resources.js"></script>
</body>
</html>
